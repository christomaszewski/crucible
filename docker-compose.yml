# CRUCIBLE — Multi-Agent Simulation Framework
#
# Network layout (sim_net 10.0.0.0/16):
#   10.0.0.10-99  — Crucible infrastructure (sim_engine, orchestrator, frontend)
#   10.0.{AGENT_ID}.X — Agent stacks (each agent gets a /24 for its services)
#
# Agent stacks join sim_net as an external network:
#   networks:
#     sim_net:
#       external: true
#       name: crucible_sim_net

networks:
  sim_net:
    name: crucible_sim_net
    driver: bridge
    ipam:
      config:
        - subnet: ${SIM_SUBNET:-10.0.0.0/16}

services:
  sim_engine:
    build:
      context: .
      dockerfile: src/crucible_engine/docker/Dockerfile.sim_engine
    networks:
      sim_net:
        ipv4_address: ${SIM_ENGINE_IP:-10.0.0.10}
    environment:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - ./config:/opt/config:ro
      - ./data/terrain:/opt/terrain:ro
    command: >
      ros2 run sim_engine sim_engine
        --ros-args -p config_file:=/opt/config/scenario.yaml

  zenoh_bridge:
    image: eclipse/zenoh-bridge-ros2dds:latest
    network_mode: "service:sim_engine"
    volumes:
      - ./config/zenoh_bridge.json5:/etc/zenoh/config.json5:ro
    depends_on:
      - sim_engine

  ws_bridge:
    build:
      context: .
      dockerfile: src/crucible_engine/docker/Dockerfile.ws_bridge
    network_mode: "service:sim_engine"
    environment:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    depends_on:
      - sim_engine
    command: ros2 run ws_bridge ws_bridge

  stack_orchestrator:
    build:
      context: ./src/crucible_orch
      dockerfile: docker/Dockerfile
    networks:
      sim_net:
        ipv4_address: ${ORCHESTRATOR_IP:-10.0.0.11}
    environment:
      - STACKS_HOST_PATH=${PWD}/stacks
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./stacks:/opt/stacks:ro

  frontend:
    build:
      context: .
      dockerfile: src/crucible_engine/docker/Dockerfile.frontend
    networks:
      - sim_net
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - ws_bridge
      - stack_orchestrator
