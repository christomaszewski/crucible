# CRUCIBLE — Agent Stack Template
#
# This is a template docker-compose file for an agent's software stack.
# CRUCIBLE's stack orchestrator launches this with environment variables
# set per agent (controllable via the System Env panel in the UI):
#
#   AGENT_ID     — integer agent ID (e.g., 1), usable for IP assignment
#   AGENT_NAME   — full agent identifier (e.g., uav_01)
#   AGENT_NS     — ROS2 namespace (defaults to AGENT_NAME)
#   FLEET_IDS    — comma-separated list of all agent IDs (e.g., 1,2,3)
#   FLEET_SIZE   — total number of agents in the scenario
#   ROS_DOMAIN_ID — DDS domain for this agent
#   RUN_ID       — auto-incrementing run counter (resets on page load)
#   SIM_NET      — Docker network name (default: crucible_sim_net)
#   STACK_DIR    — absolute host path to the compose file's directory
#                  (use for volume mounts, e.g., ${STACK_DIR}/config:/opt/config)
#   TEST_NAME    — user-defined test/scenario name (editable in UI)
#
# Network layout:
#   Crucible creates 'crucible_sim_net' (default 10.0.0.0/16).
#   Each agent gets 10.0.{AGENT_ID}.X — use the last octet to
#   differentiate services within the agent's stack.
#
# Customize this file for your specific autonomy stack.

networks:
  sim_net:
    external: true
    name: ${SIM_NET:-crucible_sim_net}

services:
  # Gateway container — anchors the agent on the sim network.
  # All other containers share this network namespace.
  comms_gateway:
    image: ros:jazzy
    networks:
      sim_net:
        ipv4_address: 10.0.${AGENT_ID}.10
    environment:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    command: ["sleep", "infinity"]  # Replace with your gateway node

  # Zenoh bridge — routes inter-agent traffic.
  # network_mode shares the network namespace only; ROS_DOMAIN_ID still needs
  # to be set explicitly so the bridge picks up DDS traffic on the agent's
  # domain rather than defaulting to domain 0.
  #
  # Multicast scouting between zenoh peers is unreliable on Docker bridge
  # networks, so peer to the central bridge over TCP via an explicit
  # connect endpoint. The central bridge listens on the sim_engine's IP
  # (default 10.0.0.10) at port 7447 — override with ZENOH_ROUTER if you
  # changed SIM_ENGINE_IP.
  zenoh_bridge:
    image: eclipse/zenoh-bridge-ros2dds:latest
    network_mode: "service:comms_gateway"
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    command: ["-e", "tcp/${ZENOH_ROUTER:-10.0.0.10:7447}"]
    # volumes:
    #   - ./zenoh_agent.json5:/etc/zenoh/config.json5:ro
    depends_on:
      - comms_gateway

  # Example: Your pose estimator
  # estimator:
  #   build: ./your_estimator
  #   network_mode: "service:comms_gateway"
  #   environment:
  #     - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
  #     - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
  #     - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
  #     - AGENT_NAME=${AGENT_NAME}
  #   depends_on:
  #     - comms_gateway

  # Example: Service with its own IP on the agent subnet
  # autopilot:
  #   build: ./your_autopilot
  #   networks:
  #     sim_net:
  #       ipv4_address: 10.0.${AGENT_ID}.20
  #   environment:
  #     - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
  #     - AGENT_NAME=${AGENT_NAME}
  #   depends_on:
  #     - comms_gateway

