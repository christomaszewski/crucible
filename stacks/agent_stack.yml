# CRUCIBLE — Agent Stack Template
#
# This is a template docker-compose file for an agent's software stack.
# CRUCIBLE's stack orchestrator launches this with environment variables
# set per agent (controllable via the System Env panel in the UI):
#
#   AGENT_ID        — integer agent ID (e.g., 1), usable for IP assignment
#   AGENT_NAME      — full agent identifier (e.g., uav_01)
#   ROS_DOMAIN_ID   — DDS domain for this agent
#   AGENT_NAMESPACE — ROS2 namespace for this agent's nodes
#   FLEET_SIZE      — total number of agents in the scenario
#   FLEET_AGENTS    — comma-separated list of all agent names
#
# Network layout:
#   Crucible creates 'crucible_sim_net' (default 10.0.0.0/16).
#   Each agent gets 10.0.{AGENT_ID}.X — use the last octet to
#   differentiate services within the agent's stack.
#
# Customize this file for your specific autonomy stack.

networks:
  sim_net:
    external: true
    name: crucible_sim_net

services:
  # Gateway container — anchors the agent on the sim network.
  # All other containers share this network namespace.
  comms_gateway:
    image: ros:jazzy
    networks:
      sim_net:
        ipv4_address: 10.0.${AGENT_ID}.10
    environment:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    command: ["sleep", "infinity"]  # Replace with your gateway node

  # Zenoh bridge — routes inter-agent traffic
  zenoh_bridge:
    image: eclipse/zenoh-bridge-ros2dds:latest
    network_mode: "service:comms_gateway"
    # volumes:
    #   - ./zenoh_agent.json5:/etc/zenoh/config.json5:ro
    depends_on:
      - comms_gateway

  # Example: Your pose estimator
